<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DamCash — Chess & Draughts Betting</title>
    <meta name="description" content="Free, open-source chess and draughts with video chat and betting" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      html { overflow-x: hidden; }
      body { background: #0f0f1a; color: #e2e8f0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1a1a2e; }
      ::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script type="module" src="/src/main.tsx"></script>
  </body>
</html>
