<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0e38"/>
      <stop offset="60%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#07070f"/>
    </linearGradient>

    <!-- Gold crown gradient -->
    <linearGradient id="goldMain" x1="0" y1="15" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff2a0"/>
      <stop offset="30%"  stop-color="#fbbf24"/>
      <stop offset="70%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>

    <!-- Crown highlight (sheen) -->
    <linearGradient id="goldSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow filter for gems -->
    <filter id="gemGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Outer card glow -->
    <filter id="cardGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded card -->
    <clipPath id="card">
      <rect width="120" height="120" rx="24"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="120" height="120" rx="24" fill="url(#bgGrad)"/>

  <!-- Subtle gold border glow -->
  <rect x="1.5" y="1.5" width="117" height="117" rx="23" fill="none"
        stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>

  <!-- Inner violet highlight rim -->
  <rect x="3" y="3" width="114" height="114" rx="22" fill="none"
        stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>

  <!-- ─── Crown body (5-spike king shape) ─── -->
  <path d="M 14 72
           L 14 44
           L 30 58
           L 60 16
           L 90 58
           L 106 44
           L 106 72
           Z"
        fill="url(#goldMain)"/>

  <!-- Crown sheen overlay -->
  <path d="M 14 72 L 14 44 L 30 58 L 60 16 L 90 58 L 106 44 L 106 72 Z"
        fill="url(#goldSheen)"/>

  <!-- Crown base band -->
  <rect x="14" y="69" width="92" height="13" rx="5" fill="url(#goldMain)"/>

  <!-- Base band highlight line -->
  <rect x="14" y="69" width="92" height="5" rx="5" fill="#fef3c7" opacity="0.18"/>

  <!-- ─── Gem at left spike ─── -->
  <circle cx="14" cy="44" r="7"   fill="#7c3aed" filter="url(#gemGlow)"/>
  <circle cx="14" cy="44" r="4"   fill="#c4b5fd"/>
  <circle cx="12.5" cy="42.5" r="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- ─── Gem at center peak (largest, blue diamond) ─── -->
  <circle cx="60" cy="16" r="8.5" fill="#0ea5e9" filter="url(#gemGlow)"/>
  <circle cx="60" cy="16" r="5"   fill="#bae6fd"/>
  <circle cx="57.5" cy="13.5" r="2" fill="#ffffff" opacity="0.7"/>

  <!-- ─── Gem at right spike ─── -->
  <circle cx="106" cy="44" r="7"  fill="#7c3aed" filter="url(#gemGlow)"/>
  <circle cx="106" cy="44" r="4"  fill="#c4b5fd"/>
  <circle cx="104.5" cy="42.5" r="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- ─── Mini checkerboard row below base ─── -->
  <g clip-path="url(#card)">
    <!-- Alternating gold tiles -->
    <rect x="14"  y="86" width="15" height="14" rx="3" fill="#f59e0b" opacity="0.80"/>
    <rect x="29"  y="86" width="15" height="14" rx="3" fill="#f59e0b" opacity="0.15"/>
    <rect x="44"  y="86" width="15" height="14" rx="3" fill="#f59e0b" opacity="0.80"/>
    <rect x="59"  y="86" width="15" height="14" rx="3" fill="#f59e0b" opacity="0.15"/>
    <rect x="74"  y="86" width="15" height="14" rx="3" fill="#f59e0b" opacity="0.80"/>
    <rect x="89"  y="86" width="17" height="14" rx="3" fill="#f59e0b" opacity="0.15"/>

    <!-- Second checker row -->
    <rect x="14"  y="100" width="15" height="20" rx="3" fill="#f59e0b" opacity="0.10"/>
    <rect x="29"  y="100" width="15" height="20" rx="3" fill="#f59e0b" opacity="0.45"/>
    <rect x="44"  y="100" width="15" height="20" rx="3" fill="#f59e0b" opacity="0.10"/>
    <rect x="59"  y="100" width="15" height="20" rx="3" fill="#f59e0b" opacity="0.45"/>
    <rect x="74"  y="100" width="15" height="20" rx="3" fill="#f59e0b" opacity="0.10"/>
    <rect x="89"  y="100" width="17" height="20" rx="3" fill="#f59e0b" opacity="0.45"/>
  </g>
</svg>
